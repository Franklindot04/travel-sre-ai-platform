name: CI - Build & Push Images

on:
  push:
    branches:
      - dev
      - develop
      - preprod
      - main
      - 'feature/**'
      - 'hotfix/**'
      - 'bugfix/**'
  pull_request:

jobs:
  versioning:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Determine next semantic version and tag
        id: version
        run: |
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          BASE=${CURRENT_VERSION%.*}
          PATCH=${CURRENT_VERSION##*.}
          NEW_VERSION="${BASE}.$((PATCH + 1))"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION already exists, skipping creation"
          else
            git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
            git push origin "$NEW_VERSION"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: versioning

    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      matrix:
        service:
          - ai-sre-agent
          - api-gateway
          - booking-service
          - inventory-service
          - payment-service
          - search-service
          - ui-portal

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ matrix.service }}
      SHA_TAG: ${{ github.sha }}
      VERSION: ${{ needs.versioning.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize OWNER to lowercase
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER_LOWER" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$OWNER/${IMAGE_NAME}:${VERSION} \
            -t $REGISTRY/$OWNER/${IMAGE_NAME}:$SHA_TAG \
            -f services/${{ matrix.service }}/Dockerfile \
            .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$OWNER/$IMAGE_NAME:${VERSION}
          docker push $REGISTRY/$OWNER/$IMAGE_NAME:$SHA_TAG

name: CI - Build & Push Images

on:
  push:
    branches:
      - dev
      - develop
      - preprod
      - main
      - 'feature/**'
      - 'hotfix/**'
      - 'bugfix/**'
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        service:
          - ai-sre-agent
          - api-gateway
          - booking-service
          - inventory-service
          - payment-service
          - search-service
          - ui-portal

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ matrix.service }}
      SHA_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize OWNER to lowercase
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER_LOWER" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$OWNER/${IMAGE_NAME}:$SHA_TAG \
            -f services/${{ matrix.service }}/Dockerfile \
            .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$OWNER/$IMAGE_NAME:$SHA_TAG

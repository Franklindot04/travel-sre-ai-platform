apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-<env>
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Franklindot04/travel-sre-ai-platform.git
    targetRevision: develop
    path: infra/k8s/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

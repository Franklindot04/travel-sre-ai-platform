apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: ai-sre-agent-alerts
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  route:
    groupBy: ['alertname']
    groupWait: 10s
    groupInterval: 30s
    repeatInterval: 2h
    receiver: ai-sre-slack
    routes:

      # -------------------------------------------------------
      # Route ALL AISREAgent* alerts to the AI SRE Agent webhook
      # -------------------------------------------------------
      - matchers:
          - name: alertname
            matchType: =~
            value: "AISREAgent.*"
        receiver: ai-sre-agent-webhook

      # -------------------------------------------------------
      # Also send all AISREAgent* alerts to Slack
      # -------------------------------------------------------
      - matchers:
          - name: alertname
            matchType: =~
            value: "AISREAgent.*"
        receiver: ai-sre-slack

  receivers:

    # -------------------------------------------------------
    # Slack Receiver (existing)
    # -------------------------------------------------------
    - name: ai-sre-slack
      slackConfigs:
        - channel: "#travel-sre-ai-platform-alerts"
          sendResolved: true
          apiURL:
            name: ai-sre-slack
            key: webhook_url

    # -------------------------------------------------------
    # AI SRE Agent Webhook Receiver (NEW)
    # -------------------------------------------------------
    - name: ai-sre-agent-webhook
      webhookConfigs:
        - url: "http://ai-sre-agent.platform.svc.cluster.local:3005/remediate"
          sendResolved: true

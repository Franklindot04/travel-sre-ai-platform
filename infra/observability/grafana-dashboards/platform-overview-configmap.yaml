apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform-overview
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  platform-overview.json: |
    {
      "id": null,
      "uid": "platform-overview",
      "title": "Platform Overview",
      "tags": ["platform", "kubernetes", "sre"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "row",
          "title": "Cluster Health",
          "collapsed": false,
          "panels": []
        },
        {
          "type": "graph",
          "title": "API Server Request Rate",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "graph",
          "title": "API Server Error Rate (5xx)",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{code=~\"5..\"}[5m]))",
              "legendFormat": "errors/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "Node & Pod Health",
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Nodes Not Ready",
          "datasource": "Prometheus",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 9 },
          "targets": [
            {
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"false\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Pods Not Ready",
          "datasource": "Prometheus",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 9 },
          "targets": [
            {
              "expr": "count(kube_pod_status_ready{condition=\"true\"} == 0)",
              "refId": "A"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Pod Restarts (last 6h)",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total[6h])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "Microservices Traffic & Errors",
          "collapsed": false,
          "panels": []
        },
        {
          "type": "graph",
          "title": "Service Request Rate",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 21 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Service Error Rate (5xx)",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 21 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ]
        }
      ]
    }

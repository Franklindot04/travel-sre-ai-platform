apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-template
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  service-template.json: |
    {
      "id": null,
      "uid": "service-template",
      "title": "Service Template",
      "tags": ["service", "sre"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(http_requests_total, service)",
            "refresh": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "type": "graph",
          "title": "Request Rate",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"$service\"}[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Error Rate (5xx)",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"$service\",status=~\"5..\"}[5m]))",
              "legendFormat": "errors/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Latency P95",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=\"$service\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ]
        }
      ]
    }
